{% extends "base.html" %}

{% block title %}Assessment{% endblock %}

{% block content %}
<!-- Premium Fonts and Icons -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --dark-bg: #f8fafc;
        --dark-card: #ffffff;
        --neon-cyan: #0d9488;
        --neon-purple: #6366f1;
        --glow-cyan: rgba(13, 148, 136, 0.04);
        --glow-purple: rgba(99, 102, 241, 0.04);
        --text-bright: #0f172a;
        --text-dim: #64748b;
        --border-neon: rgba(13, 148, 136, 0.12);
        --border-purple: rgba(99, 102, 241, 0.12);
        --glass-border: rgba(15, 23, 42, 0.08);
    }

    body {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(240, 253, 250, 0.7) 0%, rgba(254, 243, 199, 0.2) 90%) !important;
        color: var(--text-bright);
    }

    /* Outer Glowing Backgrounds - Softened for light theme */
    .cyber-bg-glow {
        position: fixed;
        width: 40vw;
        height: 40vw;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow-purple) 0%, transparent 70%);
        filter: blur(120px);
        opacity: 0.15;
        z-index: 0;
        top: -10%;
        right: -10%;
        pointer-events: none;
    }

    .cyber-bg-glow-2 {
        position: fixed;
        width: 40vw;
        height: 40vw;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
        filter: blur(120px);
        opacity: 0.15;
        z-index: 0;
        bottom: -10%;
        left: -10%;
        pointer-events: none;
    }

    .premium-assessment-card {
        background: var(--dark-card);
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04);
        border-radius: 28px;
        position: relative;
        overflow: hidden;
        z-index: 10;
        transition: all 0.4s ease;
    }

    /* Swipe Deck Structure */
    .deck-container {
        height: 380px;
        position: relative;
        perspective: 1000px;
        margin: 0 auto;
        width: 100%;
        max-width: 340px;
    }

    .swipe-card {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #ffffff;
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.06);
        cursor: grab;
        user-select: none;
        transform-origin: 50% 100%;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    }

    .swipe-card:nth-child(2) {
        transform: scale(0.95) translateY(18px);
        z-index: -1;
        opacity: 0.6;
        filter: blur(1px);
    }

    .swipe-card:nth-child(3) {
        transform: scale(0.9) translateY(36px);
        z-index: -2;
        opacity: 0.3;
        filter: blur(2px);
    }

    .swipe-card.swiping-right {
        box-shadow: 0 0 30px rgba(13, 148, 136, 0.08) inset, 0 15px 35px rgba(15, 23, 42, 0.06);
        border-color: var(--neon-cyan);
    }

    .swipe-card.swiping-left {
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.08) inset, 0 15px 35px rgba(15, 23, 42, 0.06);
        border-color: var(--neon-purple);
    }

    .swipe-card.swiped-right {
        transform: translate(180%, -20%) rotate(40deg) !important;
        opacity: 0;
        pointer-events: none;
    }

    .swipe-card.swiped-left {
        transform: translate(-180%, -20%) rotate(-40deg) !important;
        opacity: 0;
        pointer-events: none;
    }

    /* Conversational Chat System */
    .chat-container {
        height: 380px;
        overflow-y: auto;
        padding-right: 8px;
    }

    .chat-container::-webkit-scrollbar {
        width: 6px;
    }
    .chat-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.01);
        border-radius: 10px;
    }
    .chat-container::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.06);
        border-radius: 10px;
    }

    .chat-bubble {
        max-width: 85%;
        padding: 14px 20px;
        border-radius: 20px;
        line-height: 1.5;
        font-size: 0.95rem;
        animation: bubble-stagger 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        margin-bottom: 16px;
    }

    .chat-bubble.mentor {
        background: #f1f5f9;
        border: 1px solid var(--glass-border);
        color: var(--text-bright);
        border-bottom-left-radius: 4px;
        align-self: flex-start;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
    }

    .chat-bubble.user {
        background: linear-gradient(135deg, var(--neon-cyan), #0b7a70);
        color: white;
        border-bottom-right-radius: 4px;
        align-self: flex-end;
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.1);
    }

    /* Fira Code Style for Console logs */
    .console-bubble {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 0.85rem;
        background: #f8fafc !important;
        border: 1px solid var(--border-neon) !important;
        color: var(--neon-cyan) !important;
    }
    .console-bubble.user {
        border-color: var(--border-purple) !important;
        color: var(--neon-purple) !important;
        background: #f8fafc !important;
    }

    @keyframes bubble-stagger {
        from { opacity: 0; transform: translateY(14px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .typing-indicator-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 12px 18px;
        background: #f1f5f9;
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        align-self: flex-start;
        margin-bottom: 16px;
    }

    .typing-indicator-dots .dot {
        width: 6px;
        height: 6px;
        background-color: var(--text-dim);
        border-radius: 50%;
        animation: typing-wave 1.4s infinite ease-in-out both;
    }
    .typing-indicator-dots .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator-dots .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing-wave {
        0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
    }

    /* Option buttons */
    .premium-option-btn {
        background: #ffffff;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 16px 20px;
        color: var(--text-bright);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: left;
        cursor: pointer;
        outline: none;
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.01);
    }

    .premium-option-btn:hover {
        background: rgba(13, 148, 136, 0.04);
        border-color: var(--neon-cyan);
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.04);
        transform: translateY(-2px);
    }

    .premium-option-btn.selected {
        background: rgba(13, 148, 136, 0.08);
        border-color: var(--neon-cyan);
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.06);
        transform: scale(0.98);
    }

    /* Custom Cyber UI Elements */
    .cyber-badge {
        font-family: 'Outfit', sans-serif;
        letter-spacing: 2px;
        font-size: 0.7rem;
        background: rgba(13, 148, 136, 0.08);
        border: 1px solid rgba(13, 148, 136, 0.15);
        color: var(--neon-cyan);
        border-radius: 20px;
        padding: 4px 12px;
        text-transform: uppercase;
        display: inline-block;
        font-weight: 700;
    }

    /* Custom Progress bar */
    .cyber-progress-bg {
        height: 6px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
    }

    .cyber-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--neon-cyan) 0%, #0b7a70 100%);
        border-radius: 10px;
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Oblique trigger animations */
    .stagger-in {
        opacity: 0;
        transform: translateY(16px);
        animation: cyber-stagger 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes cyber-stagger {
        to { opacity: 1; transform: translateY(0); }
    }

    #intake-submit-btn, #chat-send-btn, #compile-btn {
        background-color: #0d9488 !important;
        color: #ffffff !important;
    }
    #intake-submit-btn:hover, #chat-send-btn:hover, #compile-btn:hover {
        background-color: #0f766e !important;
    }
</style>

<div class="cyber-bg-glow"></div>
<div class="cyber-bg-glow-2"></div>

<div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 relative z-10">
    <!-- Header Details with Mascot -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4">
            <div class="w-20 h-20 flex-shrink-0 relative">
                <div class="absolute inset-0 bg-teal-500/10 rounded-full blur-md animate-pulse"></div>
                <img src="/static/images/careo.png" alt="Careo Mascot" class="w-full h-full object-contain relative z-10">
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900">Careo</h1>
                <p class="text-xs font-semibold tracking-wider text-teal-600 uppercase">Your Career Guide</p>
            </div>
        </div>
        <div class="flex flex-col items-end gap-1">
            <span class="text-xs font-bold uppercase tracking-widest text-slate-500" id="phase-step-label">Phase 1 of 5</span>
            <div class="w-48 cyber-progress-bg mt-1">
                <div class="cyber-progress-fill" id="global-progress-fill" style="width: 20%;"></div>
            </div>
        </div>
    </div>

    <!-- Glowing Interactive Container Card -->
    <div class="premium-assessment-card p-8 sm:p-10 min-h-[520px] flex flex-col justify-between">
        
        <!-- Loading Shield overlay -->
        <div id="loader" class="absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
            <div class="relative flex items-center justify-center mb-6">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-teal-600"></div>
                <div class="absolute h-10 w-10 rounded-full bg-teal-50 border border-teal-200 flex items-center justify-center">
                    <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
            </div>
            <p class="text-teal-600 font-extrabold text-sm tracking-widest uppercase animate-pulse" id="loader-text">Loading Assessment...</p>
        </div>

        <!-- Upper Section Workspace -->
        <div class="w-full" id="phase-body">
            <!-- Phase layouts render here dynamically -->
        </div>

        <!-- Footer / Panel Control Bar -->
        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center w-full relative z-10">
            <a href="/assessment/reset" onclick="return confirm('WARNING: Re-initializing will wipe your current psychometric telemetry logs. Proceed?')" class="text-xs font-bold uppercase tracking-widest text-red-500 hover:text-red-600 transition-colors">
                Reset Engine
            </a>
            
            <div class="flex items-center gap-3">
                <button type="button" id="speak-btn" onclick="speakActivePrompt()" class="p-2.5 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200 transition-all" title="Audio Synthesizer Readout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                </button>
                <div class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2" id="bottom-status">
                    <span class="h-2 w-2 rounded-full bg-teal-500 animate-ping"></span> Sync Ready
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let assessmentState = {};
    let activePhaseData = null;
    let swipeLogs = [];
    let swipeCards = [];
    let activeSwipeIndex = 0;
    let activeScenarioIdx = 0;
    const total = (activePhaseData.scenarios || []).length;
    const sc = activePhaseData.scenarios[activeScenarioIdx];
    // Voice synthesizers
    let speechSynth = window.speechSynthesis;
    let activeUtterance = null;

    document.addEventListener("DOMContentLoaded", async () => {
        await refreshState();
    });

    async function refreshState() {
        showLoader("Retrieving pipeline states...");
        try {
            const res = await fetch("/assessment/api/state");
            const data = await res.json();
            if (data.status === "success") {
                assessmentState = data;
                updateHeader();
                await loadPhase();
            } else {
                window.location.href = "/dashboard";
            }
        } catch (e) {
            console.error("Critical: Failed to resolve phase nodes", e);
            hideLoader();
        }
    }

    function showLoader(text = "Processing...") {
        document.getElementById("loader-text").innerText = text;
        const loader = document.getElementById("loader");
        loader.style.opacity = "1";
        loader.style.pointerEvents = "auto";
        loader.classList.remove("hidden");
    }

    function hideLoader() {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        loader.style.pointerEvents = "none";
        setTimeout(() => loader.classList.add("hidden"), 300);
    }

    function updateHeader() {
        const isG12 = assessmentState.student_type === "12th";
        const totalPhases = assessmentState.total_phases || 5;
        const currentLabelVal = assessmentState.display_phase || 1;
        
        const gradeTitle = document.getElementById("grade-title");
        if (gradeTitle) {
            gradeTitle.innerText = isG12 ? "Grade 12 Career Track" : "Grade 10 Stream Planner";
        }
        document.getElementById("phase-step-label").innerText = `Phase ${currentLabelVal} of ${totalPhases}`;
        
        // Progress percentage calculation
        const percent = Math.round((currentLabelVal / totalPhases) * 100);
        document.getElementById("global-progress-fill").style.width = `${percent}%`;
        
        const subtitleTracker = document.getElementById("subtitle-tracker");
        if (subtitleTracker) {
            subtitleTracker.innerText = isG12 ? "Advanced Multi-Phase Diagnostic Flow" : "Interactive Stream Strategy Matrix";
        }
    }

    async function loadPhase() {
        const phase = assessmentState.current_phase;
        
        if (speechSynth.speaking) speechSynth.cancel();

        try {
            const res = await fetch("/assessment/api/questions");
            activePhaseData = await res.json();
            
            const body = document.getElementById("phase-body");
            body.innerHTML = "";

            if (phase === 0) {
                renderIntakePhase();
            } else if (phase === 1) {
                renderSwipePhase();
            } else if (phase === 2) {
                await refreshState();
            } else if (phase === 3) {
                renderProxyPhase();
            } else if (phase === 4) {
                renderScenariosPhase();
            } else if (phase === 5) {
                renderCompilePhase();
            }
            hideLoader();
        } catch (e) {
            console.error("Critical failure during question load state", e);
            hideLoader();
        }
    }

    function speakActivePrompt() {
        if (speechSynth.speaking) {
            speechSynth.cancel();
            return;
        }
        
        let text = "";
        const phase = assessmentState.current_phase;
        
        if (phase === 1) {
            const activeCard = swipeCards[activeSwipeIndex];
            if (activeCard) text = activeCard.content || activeCard.text || "";
        } else {
            const pText = document.querySelector("#phase-body h2, #phase-body p");
            if (pText) text = pText.innerText;
        }

        if (text) {
            // strip console prefixes
            text = text.replace(/^SYS_PROMPT>\s*/, '');
            activeUtterance = new SpeechSynthesisUtterance(text);
            const voices = speechSynth.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith("en-IN")) || voices.find(v => v.lang.startsWith("en"));
            if (preferredVoice) activeUtterance.voice = preferredVoice;
            speechSynth.speak(activeUtterance);
        }
    }

    // --- PHASE 1: STUDENT INTAKE ---
    function renderIntakePhase() {
        const body = document.getElementById("phase-body");
        body.innerHTML = `
            <div class="stagger-in max-w-3xl mx-auto">
                <!-- Header Title block -->
                <div class="mb-8 text-center md:text-left">
                    <span class="cyber-badge mb-2">Phase 1: Student Intake</span>
                    <h2 class="text-3xl font-extrabold text-slate-900 mt-1">Let's get to know you better</h2>
                    <p class="text-slate-500 text-sm mt-1">We'll ask you a few questions to understand you better and provide personalized insights.</p>
                </div>

                <!-- Alert Box -->
                <div class="bg-teal-50 border border-teal-100/80 text-teal-800 rounded-2xl p-4 mb-8 flex items-center gap-3 text-sm">
                    <i class="fas fa-info-circle text-teal-600 text-lg"></i>
                    <span>Your information is safe with us and will only be used to guide your career journey.</span>
                </div>

                <!-- Form Rows -->
                <form id="intake-form" onsubmit="submitIntakeForm(event)" class="space-y-6">
                    <!-- Row 1: Full Name -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-50/40 border border-slate-100 rounded-2xl gap-4 hover:border-teal-500/10 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <h4 class="text-base font-bold text-slate-900">What is your full name?</h4>
                                <p class="text-slate-400 text-xs">Please enter your full name.</p>
                            </div>
                        </div>
                        <div class="w-full md:w-80">
                            <input type="text" name="name" required placeholder="Enter your full name" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none text-sm transition-all">
                            <div class="error-msg text-red-500 text-xs mt-1 hidden">Please enter a valid name (at least 2 characters).</div>
                        </div>
                    </div>

                    <!-- Row 2: Currently Pursuing -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-50/40 border border-slate-100 rounded-2xl gap-4 hover:border-teal-500/10 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas fa-graduation-cap"></i>
                            </div>
                            <div>
                                <h4 class="text-base font-bold text-slate-900">What are you currently pursuing?</h4>
                                <p class="text-slate-400 text-xs">Select your current class/education level.</p>
                            </div>
                        </div>
                        <div class="w-full md:w-80">
                            <input type="text" name="pursuing" required placeholder="Enter current education (e.g. Grade 12)" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none text-sm transition-all">
                            <div class="error-msg text-red-500 text-xs mt-1 hidden">Please enter your current studies (at least 2 characters).</div>
                        </div>
                    </div>

                    <!-- Row 3: Areas of Interest -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-50/40 border border-slate-100 rounded-2xl gap-4 hover:border-teal-500/10 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas fa-star"></i>
                            </div>
                            <div>
                                <h4 class="text-base font-bold text-slate-900">What are your areas of interest?</h4>
                                <p class="text-slate-400 text-xs">Select all that interest you.</p>
                            </div>
                        </div>
                        <div class="w-full md:w-80">
                            <input type="text" name="interests" required placeholder="Enter interests (e.g. Technology, Art)" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none text-sm transition-all">
                            <div class="error-msg text-red-500 text-xs mt-1 hidden">Please enter your interests.</div>
                        </div>
                    </div>

                    <!-- Row 4: Parent Income -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-50/40 border border-slate-100 rounded-2xl gap-4 hover:border-teal-500/10 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas fa-wallet"></i>
                            </div>
                            <div>
                                <h4 class="text-base font-bold text-slate-900">What is your parent's approximate annual income?</h4>
                                <p class="text-slate-400 text-xs">This helps us suggest better career paths.</p>
                            </div>
                        </div>
                        <div class="w-full md:w-80">
                            <input type="text" name="parent_income" required placeholder="Enter income in numbers (e.g. 800000)" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none text-sm transition-all">
                            <div class="error-msg text-red-500 text-xs mt-1 hidden">Please enter a valid numeric income (number only).</div>
                        </div>
                    </div>

                    <!-- Row 5: Parent Occupation -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-50/40 border border-slate-100 rounded-2xl gap-4 hover:border-teal-500/10 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas fa-users"></i>
                            </div>
                            <div>

    async function submitIntakeForm(event) {
        event.preventDefault();
        const form = event.target;
        const submitBtn = document.getElementById("intake-submit-btn");
        
        const nameVal = form.name.value.trim();
        const pursuingVal = form.pursuing.value.trim();
        const interestsVal = form.interests.value.trim();
        const incomeRaw = form.parent_income.value.trim().replace(/,/g, '');
        const occupationVal = form.parent_occupation.value.trim();
        
        let isValid = true;
        
        function toggleError(inputName, show) {
            const input = form[inputName];
            const error = input.nextElementSibling;
            if (show) {
                input.classList.add("border-red-400");
                error.classList.remove("hidden");
                isValid = false;
            } else {
                input.classList.remove("border-red-400");
                error.classList.add("hidden");
            }
        }
        
        if (nameVal.length < 2) {
            toggleError("name", true);
        } else {
            toggleError("name", false);
        }
        
        if (pursuingVal.length < 2) {
            toggleError("pursuing", true);
        } else {
            toggleError("pursuing", false);
        }
        
        if (interestsVal.length < 2) {
            toggleError("interests", true);
        } else {
            toggleError("interests", false);
        }
        
        const incomeNum = Number(incomeRaw);
        if (incomeRaw === "" || isNaN(incomeNum) || incomeNum <= 0) {
            toggleError("parent_income", true);
        } else {
            toggleError("parent_income", false);
        }
        
        if (occupationVal.length < 2) {
            toggleError("parent_occupation", true);
        } else {
            toggleError("parent_occupation", false);
        }
        
        if (!isValid) return;
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Processing...`;
        
        document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Querying extraction pipeline...`;
        
        try {
            const res = await fetch("/assessment/api/intake", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: nameVal,
                    pursuing: pursuingVal,
                    interests: interestsVal,
                    parent_income: incomeNum,
                    parent_occupation: occupationVal
                })
            });
            const data = await res.json();
            
            document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Sync Ready`;
            
            if (data.status === "success") {
                setTimeout(async () => {
                    await refreshState();
                }, 800);
            } else {
                alert("Failed to submit intake. Please verify your data and try again.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = `Save & Continue <i class="fas fa-arrow-right"></i>`;
            }
        } catch (e) {
            console.error(e);
            document.getElementById("bottom-status").innerHTML = `Extraction Error`;
            submitBtn.disabled = false;
            submitBtn.innerHTML = `Save & Continue <i class="fas fa-arrow-right"></i>`;
        }
    }

            `;

    function setupDragInteraction(el) {
        let startX = 0;
        let currentX = 0;
        
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: true});
        
        function start(e) {
            startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', end);
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        }
        
        function move(e) {
            currentX = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX) - startX;
            el.style.transform = `translateX(${currentX}px) rotate(${currentX / 16}deg)`;
            
            if (currentX > 50) {
                el.classList.add('swiping-right'); el.classList.remove('swiping-left');
            } else if (currentX < -50) {
                el.classList.add('swiping-left'); el.classList.remove('swiping-right');
            } else {
                el.classList.remove('swiping-right', 'swiping-left');
            }
        }
        
        async function end() {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', end);
            document.removeEventListener('touchmove', move);
            document.removeEventListener('touchend', end);
            
            if (Math.abs(currentX) > 120) {
                const direction = currentX > 0 ? 'right' : 'left';
                handleSwipeTelemetry(direction);
            } else {
                el.style.transform = '';
                el.classList.remove('swiping-right', 'swiping-left');
            }
        }
    }

    function executeUiSwipe(direction) {
        if (isTransitioning) return;
        isTransitioning = true;

        const deck = document.getElementById("card-deck");
        const topCard = deck.querySelector(".swipe-card");
        if (!topCard) return;

        topCard.classList.add(direction === "right" ? "swiped-right" : "swiped-left");
        
        setTimeout(() => {
            handleSwipeTelemetry(direction);
        }, 200);
    }

    function handleSwipeTelemetry(direction) {
        const endTime = Date.now();
        const duration = endTime - cardStartTime;
        const activeCard = swipeCards[activeSwipeIndex];

        swipeLogs.push({
            card_id: activeCard.id,
            direction: direction,
            reaction_ms: Math.round(duration * 0.45),
            dwell_ms: duration,
            hesitation_ms: duration > 2000 ? Math.round((duration - 1000) * 0.75) : 0
        });

        activeSwipeIndex++;
        buildSwipeCards();
    }

    function wirePhase4Planner() {
        document.querySelectorAll(".phase4-tool").forEach(el => {
            el.addEventListener("dragstart", e => {
                phase4DraggedTool = decodeURIComponent(el.dataset.tool || "");
                e.dataTransfer.effectAllowed = "copy";
            });
        });

        const canvas = document.getElementById("phase4-canvas");
        canvas.addEventListener("dragover", e => e.preventDefault());
        canvas.addEventListener("drop", e => {
            e.preventDefault();
            if (!phase4DraggedTool) return;
            const rect = canvas.getBoundingClientRect();
            addPhase4Node(phase4DraggedTool, e.clientX - rect.left, e.clientY - rect.top);
            phase4DraggedTool = null;
        });
    }

    function seedPhase4Nodes(nodes) {
        phase4Items = [];
        phase4Connections = [];
        phase4NextId = 1;
        nodes.slice(0, 3).forEach((node, idx) => {
            addPhase4Node(node.label, 40 + idx * 210, 45 + idx * 70, node.description || "");
        });
    }

    function addPhase4Node(label, x, y, description = "") {
        phase4Items.push({
            id: phase4NextId++,
            label,
            description,
            x: Math.max(12, Math.round(x || 24)),
            y: Math.max(12, Math.round(y || 24))
        });
        renderPhase4Canvas();
    }

    function renderPhase4Canvas() {
        const canvas = document.getElementById("phase4-canvas");
        if (!canvas) return;
        canvas.querySelectorAll(".phase4-node, .phase4-connection").forEach(el => el.remove());
        document.getElementById("phase4-empty").style.display = phase4Items.length ? "none" : "flex";

        phase4Connections.forEach(conn => {
            const from = phase4Items.find(i => i.id === conn.from);
            const to = phase4Items.find(i => i.id === conn.to);
            if (!from || !to) return;
            const line = document.createElement("div");
            const x1 = from.x + 80;
            const y1 = from.y + 32;
            const x2 = to.x + 80;
            const y2 = to.y + 32;
            const length = Math.hypot(x2 - x1, y2 - y1);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            line.className = "phase4-connection absolute h-[2px] bg-cyan-300/70 origin-left";
            line.style.left = x1 + "px";
            line.style.top = y1 + "px";
            line.style.width = length + "px";
            line.style.transform = `rotate(${angle}deg)`;
            canvas.appendChild(line);
        });

        phase4Items.forEach(item => {
            const node = document.createElement("div");
            node.className = "phase4-node absolute w-44 rounded-xl border border-cyan-400/30 bg-slate-950/90 p-3 shadow-xl cursor-move";
            node.style.left = item.x + "px";
            node.style.top = item.y + "px";
            node.innerHTML = `
                <div class="text-sm font-bold text-white leading-snug">${item.label}</div>
                <textarea class="mt-2 w-full h-14 rounded-lg bg-black/40 border border-white/10 text-xs text-slate-200 p-2 resize-none" placeholder="Describe this step...">${item.description || ""}</textarea>
                <button class="mt-2 text-[10px] font-bold uppercase tracking-widest text-red-300 hover:text-red-200">Remove</button>
            `;
            node.querySelector("textarea").addEventListener("input", e => item.description = e.target.value);
            node.querySelector("button").addEventListener("click", () => {
                phase4Items = phase4Items.filter(i => i.id !== item.id);
                phase4Connections = phase4Connections.filter(c => c.from !== item.id && c.to !== item.id);
                renderPhase4Canvas();
            });
            node.addEventListener("mousedown", e => startPhase4NodeDrag(e, item));
            canvas.appendChild(node);
        });

        refreshPhase4Selects();
    }

    function startPhase4NodeDrag(e, item) {
        if (e.target.tagName === "TEXTAREA" || e.target.tagName === "BUTTON") return;
        const canvas = document.getElementById("phase4-canvas");
        const rect = canvas.getBoundingClientRect();
        const offsetX = e.clientX - rect.left - item.x;
        const offsetY = e.clientY - rect.top - item.y;

        function move(ev) {
            item.x = Math.max(8, Math.round(ev.clientX - rect.left - offsetX));
            item.y = Math.max(8, Math.round(ev.clientY - rect.top - offsetY));
            renderPhase4Canvas();
        }
        function stop() {
            document.removeEventListener("mousemove", move);
            document.removeEventListener("mouseup", stop);
        }
        document.addEventListener("mousemove", move);
        document.addEventListener("mouseup", stop);
    }

    function refreshPhase4Selects() {
        const from = document.getElementById("phase4-from");
        const to = document.getElementById("phase4-to");
        if (!from || !to) return;
        const options = phase4Items.map(item => `<option value="${item.id}">${item.label}</option>`).join("");
        from.innerHTML = options;
        to.innerHTML = options;
    }

    function addPhase4Connection() {
        const from = parseInt(document.getElementById("phase4-from").value, 10);
        const to = parseInt(document.getElementById("phase4-to").value, 10);
        if (!from || !to || from === to) return;
        if (!phase4Connections.some(c => c.from === from && c.to === to)) {
            phase4Connections.push({ from, to });
            renderPhase4Canvas();
        }
    }

    function clearPhase4Canvas() {
        phase4Items = [];
        phase4Connections = [];
        renderPhase4Canvas();
    }

    async function submitScenarioAnswers() {
        if (phase4Items.length === 0) {
            alert("Add at least one resource to the workspace before exporting.");
            return;
        }
        showLoader("Exporting sequence JSON...");
        try {
            const res = await fetch("/assessment/api/scenarios", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    answers: {
                        task: activePhaseData.phase4_task || {},
                        nodes: phase4Items,
                        connections: phase4Connections
                    }
                })
            });
            const data = await res.json();
            if (data.status === "success") {
                await refreshState();
            }
        } catch (e) {
            console.error(e);
            hideLoader();
        }
    }

    // --- PHASE 5: COMPILING RESULTS AND REDIRECT (BOTH) ---
    function renderCompilePhase() {
        const body = document.getElementById("phase-body");
        body.innerHTML = `
            <div class="text-center py-10 flex flex-col items-center justify-center stagger-in">
                <span class="cyber-badge mb-4">Phase 5: Career Matching</span>
                <div class="relative flex items-center justify-center mb-8">
                    <div class="animate-ping absolute inline-flex h-20 w-20 rounded-full bg-teal-500 opacity-20"></div>
                    <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-teal-500 to-indigo-500 flex items-center justify-center text-white shadow-lg shadow-teal-600/10">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                    </div>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-900">Shadow Compilation Ready</h2>
                <p class="text-slate-500 max-w-md mt-3 text-sm leading-relaxed">Your reflex latency indices, RIASEC profiles, geographical variables, and ego coefficients are consolidated.</p>
                
                <button onclick="compileFinalResults()" id="compile-btn" class="mt-8 px-12 py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-extrabold transition-all shadow-md shadow-teal-600/10 hover:scale-105 active:scale-95 tracking-widest uppercase text-xs">Execute Matrix Compilation</button>
                <p id="compiling-indicator" class="hidden text-teal-600 font-bold mt-5 animate-pulse text-xs tracking-widest uppercase">Formulating career fit projections...</p>
            </div>
        `;
    }

    async function compileFinalResults() {
        const btn = document.getElementById("compile-btn");
        const ind = document.getElementById("compiling-indicator");
        if (btn) btn.disabled = true;
        if (btn) btn.classList.add("opacity-40", "cursor-not-allowed");
        if (ind) ind.classList.remove("hidden");
        
        try {
            const res = await fetch("/assessment/api/compile", {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            });
            const data = await res.json();
            if (data.status === "success") {
                window.location.href = data.redirect;
            } else {
                alert("Compilation failed. Please try resetting assessment progress.");
                if (btn) btn.disabled = false;
                if (btn) btn.classList.remove("opacity-40", "cursor-not-allowed");
                if (ind) ind.classList.add("hidden");
            }
        } catch (e) {
            console.error(e);
            alert("Matrix Compilation Error. Check local gateway connections.");
            if (btn) btn.disabled = false;
            if (btn) btn.classList.remove("opacity-40", "cursor-not-allowed");
            if (ind) ind.classList.add("hidden");
        }
    }
</script>
{% endblock %}
