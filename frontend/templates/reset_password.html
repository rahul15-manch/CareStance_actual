{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#fefcf5]">


    <div class="relative max-w-md w-full px-6">
        <div class="bg-white/70 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/40">

            <!-- Header -->
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    New Password
                </h2>
                <p class="text-sm text-slate-500">
                    Create a strong password for your account.
                </p>
            </div>

            {% if error %}
            <div
                class="mt-4 p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-sm font-medium flex items-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Form -->
            <form class="mt-8 space-y-6" action="/reset-password/{{ token }}" method="POST">
                <div class="space-y-4">
                    <div class="relative">
                        <input id="password" name="password" type="password" required
                            class="peer w-full px-4 pt-5 pb-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[var(--teal)] focus:border-[var(--teal)] outline-none transition"
                            placeholder=" ">
                        <label for="password"
                            class="absolute left-4 top-2 text-xs text-slate-500 peer-placeholder-shown:text-sm peer-placeholder-shown:top-4 peer-placeholder-shown:text-slate-400 transition-all">
                            New Password
                        </label>
                    </div>

                    <div class="relative">
                        <input id="confirm-password" name="confirm_password" type="password" required
                            class="peer w-full px-4 pt-5 pb-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[var(--teal)] focus:border-[var(--teal)] outline-none transition"
                            placeholder=" ">
                        <label for="confirm-password"
                            class="absolute left-4 top-2 text-xs text-slate-500 peer-placeholder-shown:text-sm peer-placeholder-shown:top-4 peer-placeholder-shown:text-slate-400 transition-all">
                            Confirm New Password
                        </label>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-3 rounded-xl text-white font-bold hover:scale-[1.03] hover:shadow-xl transition-all duration-300" style="background: var(--gradient-primary);">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
